<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--gray-900);font-size:14px;line-height:1.6}
input,textarea,select,button{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--gray-100)}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
.inp{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;color:var(--gray-900);background:white;outline:none;transition:border-color .15s}

.ta{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;color:var(--gray-900);background:white;outline:none;resize:vertical;line-height:1.6}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

${VC8}

{"scores":{"market":{"score":0.0,"note":"2-3 cümle","pros":["p1","p2","p3"],"cons":["c1","c2"]},"competitive":{"score":0.0,"note":"","pros":[],"cons":[]},"financial":{"score":0.0,"note":"","pros":[],"cons":[]},"management":{"score":0.0,"note":"","pros":[],"cons":[]},"valuation":{"score":0.0,"note":"","pros":[],"cons":[]},"governance":{"score":0.0,"note":"","pros":[],"cons":[]},"value_creation":{"score":0.0,"note":"","pros":[],"cons":[]},"exit":{"score":0.0,"note":"","pros":[],"cons":[]},"founder_fit":{"score":0.0,"note":"","pros":[],"cons":[]},"network":{"score":0.0,"note":"","pros":[],"cons":[]}},"weighted_score":0.0,"unweighted_score":0.0,"recommendation":"pass|watch|meeting|diligence","confidence":"low|medium|high","executive_summary":"4-5 cümle kapsamlı özet","investment_recommendation":"2-3 cümle net tavsiye","company_analysis":{"what_they_do":"ürün açıklaması","problem_solution":"problem ve çözüm","business_model":"iş modeli","painkiller_vitamin":"painkiller mı vitamin mi ve neden","product_stage":"ürün olgunluk aşaması"},"market_analysis":{"tam":"TAM tanımı ve tahmini büyüklük","sam":"SAM tahmini","som":"SOM 3-5 yıl","growth_drivers":["d1","d2","d3"],"headwinds":["h1","h2"]},"competitive_analysis":{"summary":"rekabet özeti","moat_assessment":"moat değerlendirmesi","differentiators":["d1","d2","d3"],"vulnerabilities":["v1","v2"]},"team_assessment":{"overall":"ekip genel değerlendirme","strengths":["s1","s2","s3"],"gaps":["g1","g2"],"founder_market_fit_detail":"founder-market fit detayı"},"bull_case":["g1","g2","g3","g4","g5"],"bear_case":["r1","r2","r3","r4","r5"],"exit_analysis":{"entry_valuation":"değer","expected_exit_value":"aralık","time_to_exit":"süre","exit_routes":[{"route":"Stratejik M&A","priority":1,"probability":"Yüksek","notes":"açıklama"},{"route":"Finansal Sponsor","priority":2,"probability":"Orta","notes":""}],"return_scenarios":{"bear":{"multiple":"1.5x","irr":"8% IRR","exit_value":"değer","exit_year":"yıl","rationale":"gerekçe"},"base":{"multiple":"4x","irr":"25% IRR","exit_value":"değer","exit_year":"yıl","rationale":"gerekçe"},"bull":{"multiple":"8x","irr":"45% IRR","exit_value":"değer","exit_year":"yıl","rationale":"gerekçe"}},"exit_candidates":[{"name":"Alıcı 1","type":"Stratejik","motivation":"gerekçe","likelihood":"Yüksek"},{"name":"Alıcı 2","type":"Stratejik","motivation":"","likelihood":"Orta"},{"name":"Alıcı 3","type":"Finansal","motivation":"","likelihood":"Orta"},{"name":"Alıcı 4","type":"Stratejik","motivation":"","likelihood":"Düşük"}],"comparable_exits":[{"company":"Şirket","value":"$XXM","year":"202X","acquirer":"Alıcı","ev_multiple":"~Xx"},{"company":"Şirket 2","value":"$XXM","year":"202X","acquirer":"Alıcı","ev_multiple":"~Xx"}],"key_risks":"exit risk özeti"},"risks":[{"category":"Pazar","description":"","severity":"high","early_warning":"","test":"","mitigant":""},{"category":"Ürün","description":"","severity":"medium","early_warning":"","test":"","mitigant":""},{"category":"Teknik","description":"","severity":"medium","early_warning":"","test":"","mitigant":""},{"category":"Rekabet","description":"","severity":"high","early_warning":"","test":"","mitigant":""},{"category":"GTM","description":"","severity":"medium","early_warning":"","test":"","mitigant":""},{"category":"Finansman","description":"","severity":"medium","early_warning":"","test":"","mitigant":""}],"questions":[{"category":"Ürün","star":true,"question":"soru","good_answer":"","red_flag":""},{"category":"Teknoloji","star":true,"question":"soru","good_answer":"","red_flag":""},{"category":"Traction","star":true,"question":"soru","good_answer":"","red_flag":""},{"category":"Rekabet","star":false,"question":"soru","good_answer":"","red_flag":""},{"category":"Kurucu","star":false,"question":"soru","good_answer":"","red_flag":""},{"category":"GTM","star":false,"question":"soru","good_answer":"","red_flag":""},{"category":"Finansman","star":false,"question":"soru","good_answer":"","red_flag":""}],"scenarios":{"bull":{"label":"İy async function callAPI(msgs){
  const body={model:'claude-sonnet-4-20250514',max_tokens:8000,messages:msgs};
  const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const t=await res.text();throw new Error('Hata '+res.status+': '+t.slice(0,200));}
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  if(d.stop_reason==='tool_use'){const tr=d.content.filter(b=>b.type==='tool_use').map(b=>({type:'tool_result',tool_use_id:b.id,content:'ok'}));return callAPI([...msgs,{role:'assistant',content:d.content},{role:'user',content:tr}]);}
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function extractTextFromPDF(b64){
  return new Promise(resolve=>{
    if(window.pdfjsLib){doParse();return;}
    const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';doParse();};
    s.onerror=()=>resolve('');document.head.appendChild(s);
    async function doParse(){try{const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const pdf=await window.pdfjsLib.getDocument({data:bytes}).promise;let text='';for(let i=1;i<=Math.min(pdf.numPages,20);i++){const page=await pdf.getPage(i);const content=await page.getTextContent();text+=content.items.map(s=>s.str).join(' ')+'\n';}resolve(text.slice(0,10000));}catch{resolve('');}}
  });
}
async function parsePDF(b64){
  const pdfText=await extractTextFromPDF(b64);if(!pdfText)throw new Error('PDF metni okunamadı');
  const t=await callAPI([{role:'user',content:[{type:'text',text:`Bu pitch deck metninden startup bilgilerini çıkar:\n${pdfText}\n\nSADECE JSON döndür: {"companyName":"","website":"","sector":"","country":"","foundedYear":"","stage":"Seed","round":"","description":"","problem":"","arr":"","mrr":"","burnRate":"","runway":"","arpu":"","cac":"","ltv":"","preMoneyVal":"","postMoneyVal":"","askAmount":"","founders":[{"name":"","role":"","linkedin":""}],"competitors":"","capTable":""}`}]}]);
  return JSON.parse(t.replace(/```json|```/g,'').trim());
}

async function generatePPTX(results,form,lang){
  if(!window.PptxGenJS){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  const pptx=new window.PptxGenJS();pptx.layout='LAYOUT_16x9';pptx.title=`${form.companyName||'Startup'} - Angel Lens`;
  const N='0F2744',B='1D4ED8',W='FFFFFF',G='94A3B8',LG='F8FAFC',DG='334155';
  const ws=results.weighted_score||0;const rec=rcfg(results.recommendation);
  const recColorMap={'#DC2626':'DC2626','#B45309':'B45309','#1D4ED8':'1D4ED8','#059669':'059669'};
  const rCol=recColorMap[rec.c]||'1D4ED8';
  const ex=results.exit_analysis||{};
  // SL1 Cover
  let sl=pptx.addSlide();sl.background={color:N};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:.26,h:5.625,fill:{color:B}});
  sl.addText('ANGEL LENS',{x:.48,y:.4,w:4,h:.26,fontSize:8,color:G,bold:true,charSpacing:5});
  sl.addText(form.companyName||'Şirket',{x:.48,y:.8,w:8.5,h:1.0,fontSize:40,color:W,bold:true,fontFace:'Palatino'});
  sl.addText(`${form.sector||''} · ${form.stage} · ${new Date().toLocaleDateString('tr-TR',{month:'long',year:'numeric'})}`,{x:.48,y:1.82,w:7,h:.3,fontSize:11,color:G});
  sl.addShape(pptx.shapes.RECTANGLE,{x:.48,y:2.28,w:1.58,h:1.52,fill:{color:'1E3A5F'}});
  sl.addText(ws.toFixed(1),{x:.48,y:2.34,w:1.58,h:.88,fontSize:36,color:scHex(ws),bold:true,align:'center'});
  sl.addText('/10',{x:.48,y:3.18,w:1.58,h:.28,fontSize:10,color:G,align:'center'});
  sl.addShape(pptx.shapes.RECTANGLE,{x:2.3,y:2.52,w:2.52,h:.55,fill:{color:rCol}});
  sl.addText(lang==='tr'?rec.tr:rec.en,{x:2.3,y:2.52,w:2.52,h:.55,fontSize:11,color:W,bold:true,align:'center',valign:'middle'});
  sl.addText(results.executive_summary||'',{x:.48,y:3.78,w:9.2,h:1.3,fontSize:11,color:'CBD5E1',wrap:true,lineSpacingMultiple:1.4});
  // SL2 Kriterler
  sl=pptx.addSlide();sl.background={color:LG};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.5,fill:{color:N}});
  sl.addText(lang==='tr'?'VC 8 KRİTERİ & ANGEL KRİTERLERİ':'VC 8 CRITERIA & ANGEL CRITERIA',{x:.4,y:0,w:9,h:.5,fontSize:12,color:W,bold:true,valign:'middle'});
  [...VC,...AG].forEach((c,i)=>{if(i>=10)return;const s=results.scores?.[c.id]?.score||0,col=scHex(s),y=.65+i*.44;sl.addText(lang==='tr'?c.tr:c.en,{x:.3,y,w:2.8,h:.32,fontSize:10,color:DG,valign:'middle'});if(c.w>0)sl.addText(`×${c.w}%`,{x:3.15,y:y+.05,w:.4,h:.22,fontSize:8,color:G,align:'center'});sl.addShape(pptx.shapes.RECTANGLE,{x:3.65,y:y+.09,w:5.5,h:.15,fill:{color:'E2E8F0'}});const bw=(s/10)*5.5;if(bw>.01)sl.addShape(pptx.shapes.RECTANGLE,{x:3.65,y:y+.09,w:bw,h:.15,fill:{color:col}});sl.addText(s.toFixed(1),{x:9.28,y,w:.48,h:.32,fontSize:11,color:col,bold:true,align:'right',valign:'middle'});});
  // SL3 Exit
  sl=pptx.addSlide();sl.background={color:LG};

        form.founders.map((f,i)=>h('div',{key:i,style:{background:'var(--gray-50)',borderRadius:7,padding:14,marginBottom:10,position:'relative',border:'1px solid var(--gray-200)'}},
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 90px 1.4fr',gap:10}},
            h('div',null,h('div',{className:'lbl'},L('İsim','Name')),h('input',{className:'inp',value:f.name||'',onChange:ev=>updF(i,'name')(ev.target.value)})),
            h('div',null,h('div',{className:'lbl'},L('Rol','Role')),h('input',{className:'inp',value:f.role||'',onChange:ev=>updF(i,'role')(ev.target.value)})),
            h('div',null,h('div',{className:'lbl'},'LinkedIn'),h('input',{className:'inp',value:f.linkedin||'',onChange:ev=>updF(i,'linkedin')(ev.target.value)}))
          ),
          form.founders.length>1&&h('button',{onClick:()=>setForm(p=>({...p,founders:p.founders.filter((_,idx)=>idx!==i)})),style:{position:'absolute',top:10,right:12,background:'none',border:'none',cursor:'pointer',color:'var(--gray-400)',fontSize:16}},'×')
        )),
        form.founders.length<5&&h('button',{onClick:()=>setForm(p=>({...p,founders:[...p.founders,{name:'',role:'',linkedin:''}]})),style:{fontSize:13,color:'var(--blue)',background:'var(--blue-light)',border:'1px solid var(--blue-mid)',borderRadius:6,padding:'7px 14px',cursor:'pointer',fontWeight:600}},`+ ${L('Kurucu Ekle','Add Founder')}`)
      ),
      h('div',{className:'card'},h('div',{className:'sec'},L('Finansal Metrikler','Financial Metrics')),
        h('div',{className:'g3'},
          ...[['arr','ARR ($)'],['mrr','MRR ($)'],['burnRate',L('Aylık Burn ($)','Monthly Burn ($)')],['runway',L('Runway (ay)','Runway (mo)')],['arpu','ARPU ($)'],['cac','CAC ($)'],['ltv','LTV ($)'],['preMoneyVal','Pre-Money ($)'],['askAmount',L('Aranan Yatırım ($)','Funding Ask ($)')]].map(([k,lbl])=>h('div',{key:k},h('div',{className:'lbl'},lbl),h('input',{className:'inp',value:form[k]||'',onChange:updNum(k)})))
        )
      ),
      h('div',{className:'card'},h('div',{className:'sec'},L('Ek Bilgiler','Additional Information')),
        h('div',{style:{marginBottom:12}},h('div',{className:'lbl'},L('Başlıca Rakipler','Competitors')),h('textarea',{className:'ta',rows:2,value:form.competitors||'',onChange:ev=>upd('competitors')(ev.target.value)})),
        h('div',null,h('div',{className:'lbl'},L('Ortaklık Yapısı (Cap Table)','Cap Table')),h('textarea',{className:'ta',rows:2,value:form.capTable||'',onChange:ev=>upd('capTable')(ev.target.value)}))
      ),
      h('div',{className:'card'},h('div',{className:'sec'},L('Analiz Ayarları','Settings')),
        h('div',{className:'lbl',style:{marginBottom:8}},L('ANALİZ DERİNLİĞİ','DEPTH')),
        h('div',{style:{display:'flex',gap:8}},[['deep',L('🔬 Derin Analiz','🔬 Deep Analysis')],['fast',L('⚡ Hızlı Analiz','⚡ Fast Analysis')]].map(([v,lbl])=>h('button',{key:v,onClick:()=>setDepth(v),className:`tog${depth===v?' on':''}`},lbl)))
      ),
      h('button',{className:'btn-primary',onClick:handleAnalyze,disabled:!form.companyName.trim()},L('Analizi Başlat →','Start Analysis →'))
    )
  );

  if(step==='analyzing')return h('div',null,header,
    h('div',{style:{maxWidth:480,margin:'90px auto',padding:'0 24px',textAlign:'center'}},
      h('div',{style:{width:64,height:64,borderRadius:'50%',background:'var(--navy)',margin:'0 auto 24px',display:'flex',alignItems:'center',justifyContent:'center'}},h('svg',{width:28,height:28,viewBox:'0 0 28 28',fill:'none'},h('path',{d:'M6 22L14 6L22 22',stroke:'white',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}),h('path',{d:'M9 16H19',stroke:'#60A5FA',strokeWidth:2,strokeLinecap:'round'}))),
      h('div',{style:{fontSize:20,fontWeight:700,fontFamily:'Playfair Display',color:'var(--navy)',marginBottom:10}},L('Analiz Yapılıyor…','Analyzing…')),
      h('div',{style:{color:'var(--gray-400)',fontSize:13,marginBottom:28,lineHeight:1.6,minHeight:44}},MSGS[lang][loadIdx]),
      h('div',{style:{background:'var(--gray-200)',borderRadius:3,height:3,overflow:'hidden'}},h('div',{style:{height:'100%',width:`${(loadIdx+1)/7*100}%`,background:'var(--blue)',borderRadius:3,transition:'width .6s ease'}})),
      h('div',{style:{marginTop:10,fontSize:12,color:'var(--gray-400)'}},`${loadIdx+1} / 7`)
    )
  );

  if(step==='results'&&results)return h('div',null,header,toastEl,h(Results,{results,form,lang,onPptx:handlePptx,pptxBusy}));
  return h('div',null,header);
}
ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
