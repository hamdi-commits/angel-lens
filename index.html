<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Lens</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F9FAFB;color:#111827;min-height:100vh}
input,textarea,select,button{font-family:'DM Sans',sans-serif}
.inp{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#111827;background:white;outline:none}
.inp:focus{border-color:#2563EB}
.ta{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#111827;background:white;outline:none;resize:vertical}
.sel{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#111827;background:white;outline:none}
.card{background:white;border-radius:16px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:18px}
.st{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#111827;margin-bottom:14px}
.lbl{font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.6px;margin-bottom:5px;text-transform:uppercase}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn-p{width:100%;padding:14px;background:#111827;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.btn-p:disabled{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed}
.tog{padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:2px solid #E5E7EB;background:white;color:#6B7280}
.tog.on{border-color:#2563EB;background:#EFF6FF;color:#2563EB}
.bt{height:4px;background:#F3F4F6;border-radius:2px;overflow:hidden;margin-top:4px}
.bf{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:11px 14px;margin-bottom:14px;color:#DC2626;font-size:13px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease}
@media print{header,button{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React;
const h=React.createElement;

const VC=[
  {id:'market',tr:'Pazar Değerlendirmesi',w:15},
  {id:'competitive',tr:'Rekabet Avantajı',w:20},
  {id:'financial',tr:'Finansal Profil',w:15},
  {id:'management',tr:'Yönetim',w:20},
  {id:'valuation',tr:'Şirket Değeri',w:10},
  {id:'governance',tr:'Denetim & Kontrol',w:5},
  {id:'value_creation',tr:'Değer Yaratma',w:5},
  {id:'exit',tr:'Çıkış Fırsatları',w:10},
];
const AG=[
  {id:'founder_fit',tr:'Founder-Market Fit'},
  {id:'network',tr:'Kişisel Ağ Değeri'},
];

const MSGS=['Pitch deck analiz ediliyor…','Kurucu profilleri araştırılıyor…','Pazar ve rekabet verileri taranıyor…','VC 8 Kriteri uygulanıyor…','Angel kriterleri değerlendiriliyor…','Exit ve getiri analizi hesaplanıyor…','Yatırım raporu derleniyor…'];
const VC8=`GİRİŞİM SERMAYESİ FONLARININ 8 KRİTERİ:
1.PAZAR: Büyümeye açık, talep yüksek, rekabet uygun?
2.REKABET AVANTAJI: Sürdürülebilir avantaj var mı?
3.FİNANSAL PROFİL: Finansal yapı büyümeyi taşıyabilir mi?
4.YÖNETİM: Ekip yetkinliği, açıklar, motivasyon?
5.ŞİRKET DEĞERİ: Değerleme makul mü?
6.DENETİM&KONTROL: Azınlık hakları korunuyor mu?
7.DEĞER YARATMA: Sermaye dışı katkı var mı?
8.ÇIKIŞ: Uygun çıkış yolu ve alıcılar?
ANGEL EK:
9.FOUNDER-MARKET FIT: Kurucular bu problem için ideal mi?
10.KİŞİSEL AĞ: Yatırımcı ağıyla ne katkı sağlayabilir?`;

const sc=s=>s>=7.5?'#059669':s>=6?'#D97706':s>=4.5?'#EA580C':'#DC2626';
const REC={pass:{tr:'GEÇ',bg:'#FEF2F2',c:'#DC2626',b:'#FECACA'},watch:{tr:'İZLE',bg:'#FFFBEB',c:'#D97706',b:'#FDE68A'},meeting:{tr:'TOPLANTI AL',bg:'#EFF6FF',c:'#2563EB',b:'#BFDBFE'},diligence:{tr:'DERİN İNCELEME',bg:'#F0FDF4',c:'#059669',b:'#A7F3D0'}};
const rcfg=r=>REC[r]||REC.meeting;

// API call via our Vercel proxy
async function callAPI(msgs,search=false){
  const body={model:'claude-sonnet-4-20250514',max_tokens:4000,messages:msgs};
  if(search)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const t=await res.text();throw new Error('Hata '+res.status+': '+t.slice(0,200));}
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  if(d.stop_reason==='tool_use'){
    const tr=d.content.filter(b=>b.type==='tool_use').map(b=>({type:'tool_result',tool_use_id:b.id,content:'ok'}));
    return callAPI([...msgs,{role:'assistant',content:d.content},{role:'user',content:tr}],search);
  }
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function parsePDF(b64){
  const t=await callAPI([{role:'user',content:[
    {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
    {type:'text',text:'Bu pitch deck PDF\'inden startup bilgilerini çıkar. SADECE JSON döndür, başka bir şey yazma:\n{"companyName":"","website":"","sector":"","country":"","foundedYear":"","stage":"Seed","round":"","description":"","problem":"","arr":"","mrr":"","burnRate":"","runway":"","arpu":"","cac":"","ltv":"","preMoneyVal":"","postMoneyVal":"","askAmount":"","founders":[{"name":"","role":"","linkedin":""}],"competitors":"","capTable":""}'}
  ]}]);
  return JSON.parse(t.replace(/```json|```/g,'').trim());
}

function buildPrompt(form,depth){
  const founders=form.founders.filter(f=>f.name).map(f=>`- ${f.name} (${f.role||'?'})`).join('\n')||'-';
  return `Sen üst düzey VC General Partner ve deneyimli Angel Investor'sın.
STARTUP: ${form.companyName||'?'} | ${form.website||''} | ${form.sector||''} | ${form.country||''} | ${form.stage}
Açıklama: ${form.description||'?'} | Problem: ${form.problem||'?'}
Kurucular:\n${founders}
Finansallar: ARR=${form.arr||'?'} MRR=${form.mrr||'?'} Burn=${form.burnRate||'?'}/ay Runway=${form.runway||'?'}ay ARPU=${form.arpu||'?'} CAC=${form.cac||'?'} LTV=${form.ltv||'?'}
Değerleme: Pre=${form.preMoneyVal||'?'} Ask=${form.askAmount||'?'}
Rakipler: ${form.competitors||'?'}
${VC8}
${depth==='deep'?'Derin araştırma modunda çalış.':'Hızlı analiz yap.'}
SADECE geçerli JSON döndür, başka hiçbir şey yazma. Puanlar 0.0-10.0.
{"scores":{"market":{"score":0.0,"note":"","pros":[],"cons":[]},"competitive":{"score":0.0,"note":"","pros":[],"cons":[]},"financial":{"score":0.0,"note":"","pros":[],"cons":[]},"management":{"score":0.0,"note":"","pros":[],"cons":[]},"valuation":{"score":0.0,"note":"","pros":[],"cons":[]},"governance":{"score":0.0,"note":"","pros":[],"cons":[]},"value_creation":{"score":0.0,"note":"","pros":[],"cons":[]},"exit":{"score":0.0,"note":"","pros":[],"cons":[]},"founder_fit":{"score":0.0,"note":"","pros":[],"cons":[]},"network":{"score":0.0,"note":"","pros":[],"cons":[]}},"weighted_score":0.0,"unweighted_score":0.0,"recommendation":"pass|watch|meeting|diligence","confidence":"low|medium|high","executive_summary":"3-4 cümle","bull_case":["g1","g2","g3"],"bear_case":["r1","r2","r3"],"exit_analysis":{"entry_valuation":"$5M","expected_exit_value":"$20M-$40M","time_to_exit":"3-5 yıl","exit_routes":[{"route":"Stratejik M&A","priority":1,"probability":"Yüksek","notes":""}],"return_scenarios":{"bear":{"multiple":"1.5x","irr":"8% IRR","exit_value":"$7M","exit_year":"2029","rationale":""},"base":{"multiple":"4x","irr":"25% IRR","exit_value":"$20M","exit_year":"2028","rationale":""},"bull":{"multiple":"8x","irr":"45% IRR","exit_value":"$40M","exit_year":"2027","rationale":""}},"exit_candidates":[{"name":"Alıcı","type":"Stratejik","motivation":"","likelihood":"Yüksek"}],"comparable_exits":[{"company":"","value":"","year":"","acquirer":"","ev_multiple":""}],"key_risks":""},"risks":[{"category":"Pazar","description":"","severity":"high","test":""},{"category":"Ürün","description":"","severity":"medium","test":""},{"category":"Teknik","description":"","severity":"medium","test":""},{"category":"Rekabet","description":"","severity":"high","test":""},{"category":"GTM","description":"","severity":"medium","test":""}],"questions":[{"category":"Ürün","question":"soru","good_answer":"","red_flag":""},{"category":"Teknoloji","question":"soru","good_answer":"","red_flag":""},{"category":"Traction","question":"soru","good_answer":"","red_flag":""},{"category":"Rekabet","question":"soru","good_answer":"","red_flag":""},{"category":"Kurucu","question":"soru","good_answer":"","red_flag":""}],"scenarios":{"bull":{"label":"İyi Durum","score":0.0,"description":""},"base":{"label":"Baz","score":0.0,"description":""},"bear":{"label":"Kötü Durum","score":0.0,"description":""}},"breakout_conditions":["k1","k2","k3"],"key_question":"soru","metrics_to_watch":["m1","m2","m3"]}`;
}

// UI Components
function Gauge({score,size=120}){
  const[d,setD]=useState(0);
  useEffect(()=>{const t0=Date.now(),a=()=>{const t=Math.min((Date.now()-t0)/1300,1),ev=1-Math.pow(1-t,3);setD(score*ev);if(t<1)requestAnimationFrame(a);};requestAnimationFrame(a);},[score]);
  const r=42,cx=54,cy=54,C=2*Math.PI*r,dash=(d/10)*C,col=sc(score);
  return h('svg',{width:size,height:size,viewBox:'0 0 108 108'},
    h('circle',{cx,cy,r,fill:'none',stroke:'#F1F5F9',strokeWidth:8}),
    h('circle',{cx,cy,r,fill:'none',stroke:col,strokeWidth:8,strokeDasharray:`${dash} ${C}`,strokeLinecap:'round',transform:`rotate(-90 ${cx} ${cy})`}),
    h('text',{x:cx,y:cy-3,textAnchor:'middle',fill:col,style:{fontSize:20,fontWeight:700,fontFamily:"'Sora',sans-serif"}},d.toFixed(1)),
    h('text',{x:cx,y:cy+13,textAnchor:'middle',fill:'#9CA3AF',style:{fontSize:9}},'/10')
  );
}

function CBar({label,score,weight}){
  const[w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(score*10),160);return()=>clearTimeout(t);},[score]);
  return h('div',{style:{marginBottom:11}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
      h('span',{style:{fontSize:13,color:'#374151'}},label),
      h('div',{style:{display:'flex',alignItems:'center',gap:6}},
        weight>0&&h('span',{style:{fontSize:10,color:'#9CA3AF'}},`×${weight}%`),
        h('span',{style:{fontSize:13,fontWeight:700,color:sc(score),width:28,textAlign:'right'}},score.toFixed(1))
      )
    ),
    h('div',{className:'bt'},h('div',{className:'bf',style:{width:`${w}%`,background:sc(score)}}))
  );
}

function Results({results,form}){
  const R=rcfg(results.recommendation),ws=results.weighted_score||0,us=results.unweighted_score||0;
  const ex=results.exit_analysis||{};
  const sevBg=s=>s==='high'?'#FEF2F2':s==='low'?'#F0FDF4':'#FFFBEB';
  const sevC=s=>s==='high'?'#DC2626':s==='low'?'#059669':'#D97706';
  const scnC={bear:{bg:'#FEF2F2',b:'#FECACA',c:'#DC2626',lbl:'Kötü Durum'},base:{bg:'#FFFBEB',b:'#FDE68A',c:'#D97706',lbl:'Baz Senaryo'},bull:{bg:'#F0FDF4',b:'#A7F3D0',c:'#059669',lbl:'İyi Durum'}};
  return h('div',{style:{maxWidth:980,margin:'0 auto',padding:'28px 20px'},className:'fi'},
    // HERO
    h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:18}},
        h('div',{style:{flex:1,minWidth:260}},
          h('div',{style:{fontSize:11,fontWeight:700,color:'#6B7280',letterSpacing:'.8px',marginBottom:6}},`${(form.companyName||'').toUpperCase()} · ${form.stage?.toUpperCase()}`),
          h('div',{style:{fontSize:22,fontWeight:800,fontFamily:"'Sora',sans-serif",color:'#111827',marginBottom:10,letterSpacing:'-.3px'}},'Yatırım Değerlendirmesi'),
          h('div',{style:{fontSize:13,color:'#4B5563',lineHeight:1.7,maxWidth:500,marginBottom:16}},results.executive_summary),
          h('div',{style:{display:'inline-flex',alignItems:'center',gap:8,background:R.bg,border:`1.5px solid ${R.b}`,borderRadius:10,padding:'8px 16px'}},
            h('div',{style:{width:8,height:8,borderRadius:'50%',background:R.c}}),
            h('span',{style:{fontSize:13,fontWeight:800,color:R.c,letterSpacing:'.5px'}},R.tr)
          )
        ),
        h('div',{style:{display:'flex',gap:20,alignItems:'center'}},
          h('div',{style:{textAlign:'center'}},h(Gauge,{score:ws,size:120}),h('div',{style:{fontSize:10,fontWeight:700,color:'#9CA3AF',letterSpacing:'.6px',textTransform:'uppercase',marginTop:4}},'Ağırlıklı')),
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:32,fontWeight:800,color:sc(us),lineHeight:1}},us.toFixed(1)),h('div',{style:{fontSize:10,fontWeight:700,color:'#9CA3AF',letterSpacing:'.6px',textTransform:'uppercase',marginTop:4}},'Ağırlıksız'))
        )
      )
    ),
    // CRITERIA
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:0}},
      h('div',{className:'card',style:{marginBottom:16}},
        h('div',{className:'st'},'VC 8 Kriteri'),
        VC.map(c=>h(CBar,{key:c.id,label:c.tr,score:results.scores?.[c.id]?.score||0,weight:c.w}))
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:16}},
        h('div',{className:'card',style:{marginBottom:0}},
          h('div',{className:'st'},'Angel Kriterleri'),
          AG.map(c=>h('div',{key:c.id},
            h(CBar,{label:c.tr,score:results.scores?.[c.id]?.score||0,weight:0}),
            results.scores?.[c.id]?.note&&h('div',{style:{fontSize:12,color:'#6B7280',lineHeight:1.5,marginTop:-4,marginBottom:10}},results.scores[c.id].note)
          ))
        ),
        results.scenarios&&h('div',{className:'card',style:{marginBottom:0}},
          h('div',{className:'st'},'Senaryo Analizi'),
          Object.entries(results.scenarios).map(([k,s])=>h('div',{key:k,style:{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #F3F4F6'}},
            h('div',null,h('div',{style:{fontSize:13,fontWeight:700,marginBottom:2}},s.label),h('div',{style:{fontSize:12,color:'#6B7280',maxWidth:180}},s.description)),
            h('span',{style:{fontSize:19,fontWeight:800,color:sc(s.score||0)}},(s.score||0).toFixed(1))
          ))
        )
      )
    ),
    // CRITERION DETAIL
    h('div',{className:'card'},
      h('div',{className:'st'},'Kriter Detayları'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        [...VC,...AG].map(c=>{const s=results.scores?.[c.id];if(!s)return null;
          return h('div',{key:c.id,style:{background:'#F9FAFB',borderRadius:10,padding:12,borderLeft:`2px solid ${sc(s.score||0)}`}},
            h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:5}},h('span',{style:{fontSize:12,fontWeight:700}},c.tr),h('span',{style:{fontSize:13,fontWeight:800,color:sc(s.score||0)}},(s.score||0).toFixed(1))),
            h('div',{style:{fontSize:12,color:'#6B7280',lineHeight:1.5,marginBottom:5}},s.note),
            s.pros?.slice(0,2).map((p,i)=>h('div',{key:i,style:{fontSize:11,color:'#059669',marginBottom:2}},`+ ${p}`)),
            s.cons?.slice(0,2).map((cc,i)=>h('div',{key:i,style:{fontSize:11,color:'#DC2626',marginBottom:2}},`− ${cc}`))
          );
        })
      )
    ),
    // EXIT ANALİZİ
    h('div',{className:'card'},
      h('div',{className:'st'},'Çıkış Analizi & Getiri Hesabı'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:20}},
        [{l:'Giriş Değeri',v:ex.entry_valuation||form.preMoneyVal||'—',c:'#2563EB'},{l:'Hedef Exit',v:ex.expected_exit_value||'—',c:'#059669'},{l:'Exit Süresi',v:ex.time_to_exit||'—',c:'#7C3AED'},{l:'Baz Getiri',v:ex.return_scenarios?.base?.multiple||'—',c:'#D97706'}]
        .map(({l,v,c})=>h('div',{key:l,style:{background:'#F9FAFB',borderRadius:10,padding:'12px 14px',borderTop:`3px solid ${c}`}},
          h('div',{style:{fontSize:11,fontWeight:700,color:'#6B7280',marginBottom:5,textTransform:'uppercase',letterSpacing:'.4px'}},l),
          h('div',{style:{fontSize:17,fontWeight:800,color:'#111827'}},v)
        ))
      ),
      h('div',{style:{fontSize:12,fontWeight:700,color:'#6B7280',letterSpacing:'.8px',textTransform:'uppercase',marginBottom:10}},'Getiri Senaryoları'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}},
        ['bear','base','bull'].map(key=>{
          const s=ex.return_scenarios?.[key],cfg=scnC[key];if(!s)return null;
          return h('div',{key,style:{background:cfg.bg,border:`1.5px solid ${cfg.b}`,borderRadius:14,padding:16}},
            h('div',{style:{fontSize:11,fontWeight:800,color:cfg.c,marginBottom:10,textTransform:'uppercase',letterSpacing:'.5px'}},cfg.lbl),
            h('div',{style:{fontSize:32,fontWeight:800,color:cfg.c,lineHeight:1,marginBottom:4}},s.multiple||'?x'),
            h('div',{style:{fontSize:13,fontWeight:600,color:'#374151',marginBottom:2}},s.exit_value||''),
            h('div',{style:{fontSize:12,color:'#6B7280',marginBottom:2}},s.irr||''),
            h('div',{style:{fontSize:11,color:'#9CA3AF',marginBottom:8}},s.exit_year||''),
            h('div',{style:{fontSize:12,color:'#4B5563',lineHeight:1.5,borderTop:`1px solid ${cfg.b}`,paddingTop:8}},s.rationale||'')
          );
        })
      ),
      ex.exit_candidates&&h('div',{style:{marginBottom:16}},
        h('div',{style:{fontSize:12,fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:10}},'Potansiyel Alıcılar'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
          ex.exit_candidates.map((c,i)=>h('div',{key:i,style:{background:'white',border:'1.5px solid #E5E7EB',borderRadius:10,padding:12}},
            h('div',{style:{fontWeight:700,fontSize:13,marginBottom:4}},c.name||''),
            h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
              h('span',{style:{fontSize:11,color:'#6B7280'}},c.type||''),
              h('span',{style:{fontSize:11,fontWeight:700,color:c.likelihood?.includes('Yüksek')?'#059669':c.likelihood?.includes('Düşük')?'#DC2626':'#D97706'}},c.likelihood||'')
            ),
            h('div',{style:{fontSize:11,color:'#6B7280',lineHeight:1.5}},c.motivation||'')
          ))
        )
      ),
      ex.key_risks&&h('div',{style:{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:10,padding:'10px 14px'}},
        h('div',{style:{fontSize:11,fontWeight:800,color:'#EA580C',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}},'Exit Riski'),
        h('div',{style:{fontSize:13,color:'#7C2D12',lineHeight:1.6}},ex.key_risks)
      )
    ),
    // BULL/BEAR
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:18}},
      h('div',{style:{background:'#F0FDF4',border:'1px solid #A7F3D0',borderRadius:16,padding:18}},
        h('div',{style:{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,color:'#065F46',marginBottom:12}},'Bull Case'),
        (results.bull_case||[]).map((it,i)=>h('div',{key:i,style:{display:'flex',gap:7,marginBottom:8,fontSize:13,color:'#064E3B',lineHeight:1.5}},h('span',{style:{color:'#059669',fontWeight:700,flexShrink:0}},`${i+1}.`),h('span',null,it)))
      ),
      h('div',{style:{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:16,padding:18}},
        h('div',{style:{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,color:'#9A3412',marginBottom:12}},'Bear Case'),
        (results.bear_case||[]).map((it,i)=>h('div',{key:i,style:{display:'flex',gap:7,marginBottom:8,fontSize:13,color:'#7C2D12',lineHeight:1.5}},h('span',{style:{color:'#EA580C',fontWeight:700,flexShrink:0}},`${i+1}.`),h('span',null,it)))
      )
    ),
    // RISKS
    results.risks&&h('div',{className:'card'},
      h('div',{className:'st'},'Başlıca Riskler'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        results.risks.map((r,i)=>h('div',{key:i,style:{background:sevBg(r.severity),borderRadius:10,padding:12}},
          h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:5}},h('span',{style:{fontSize:12,fontWeight:700}},r.category),h('span',{style:{fontSize:9,fontWeight:800,color:sevC(r.severity),background:'white',borderRadius:4,padding:'2px 6px',letterSpacing:'.5px'}},(r.severity||'').toUpperCase())),
          h('div',{style:{fontSize:12,color:'#374151',lineHeight:1.5,marginBottom:r.test?5:0}},r.description),
          r.test&&h('div',{style:{fontSize:11,color:'#6B7280',borderTop:'1px solid rgba(0,0,0,.05)',paddingTop:4}},r.test)
        ))
      )
    ),
    // QUESTIONS
    results.questions&&h('div',{className:'card'},
      h('div',{className:'st'},'Toplantıda Sorulacak Sorular'),
      results.questions.map((q,i)=>h('div',{key:i,style:{borderLeft:'3px solid #2563EB',paddingLeft:12,marginBottom:16}},
        h('div',{style:{fontSize:10,fontWeight:800,color:'#2563EB',letterSpacing:'.7px',marginBottom:3,textTransform:'uppercase'}},(q.category||'').toUpperCase()),
        h('div',{style:{fontWeight:700,fontSize:14,color:'#111827',marginBottom:7,lineHeight:1.5}},q.question),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('div',{style:{background:'#F0FDF4',borderRadius:8,padding:'8px 10px'}},h('div',{style:{fontSize:10,fontWeight:700,color:'#059669',marginBottom:3,textTransform:'uppercase'}},'İyi cevap'),h('div',{style:{fontSize:12,color:'#065F46',lineHeight:1.5}},q.good_answer)),
          h('div',{style:{background:'#FFF7ED',borderRadius:8,padding:'8px 10px'}},h('div',{style:{fontSize:10,fontWeight:700,color:'#EA580C',marginBottom:3,textTransform:'uppercase'}},'Red flag'),h('div',{style:{fontSize:12,color:'#9A3412',lineHeight:1.5}},q.red_flag))
        )
      ))
    ),
    results.key_question&&h('div',{style:{background:'linear-gradient(135deg,#EFF6FF,#F5F3FF)',border:'1.5px solid #BFDBFE',borderRadius:16,padding:18,marginBottom:16}},
      h('div',{style:{fontSize:10,fontWeight:800,color:'#2563EB',letterSpacing:'.7px',marginBottom:7,textTransform:'uppercase'}},'Tek Soru Hakkımız Olsaydı'),
      h('div',{style:{fontSize:14,fontWeight:600,color:'#1E3A8A',lineHeight:1.7,fontStyle:'italic'}},`"${results.key_question}"`)
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}},
      results.breakout_conditions&&h('div',{className:'card',style:{marginBottom:0}},
        h('div',{className:'st'},'Breakout Koşulları'),
        results.breakout_conditions.map((c,i)=>h('div',{key:i,style:{display:'flex',gap:8,marginBottom:8,fontSize:13,lineHeight:1.5}},h('span',{style:{color:'#2563EB',fontWeight:700,flexShrink:0}},`${i+1}.`),h('span',{style:{color:'#374151'}},c)))
      ),
      results.metrics_to_watch&&h('div',{className:'card',style:{marginBottom:0}},
        h('div',{className:'st'},'Takip Metrikleri'),
        results.metrics_to_watch.map((m,i)=>h('div',{key:i,style:{display:'flex',gap:8,alignItems:'center',padding:'6px 0',borderBottom:'1px solid #F3F4F6'}},h('div',{style:{width:5,height:5,borderRadius:'50%',background:'#2563EB',flexShrink:0}}),h('span',{style:{fontSize:13,color:'#374151'}},m)))
      )
    ),
    h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',null,h('div',{className:'st',style:{marginBottom:2}},'Raporu İndir'),h('div',{style:{fontSize:12,color:'#6B7280'}},'PDF: Ctrl+P ile kaydedin')),
        h('button',{onClick:()=>window.print(),style:{padding:'10px 20px',background:'#DC2626',color:'white',border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer'}},'PDF')
      )
    )
  );
}

function App(){
  const[step,setStep]=useState('form');
  const[depth,setDepth]=useState('deep');
  const[loadIdx,setLoadIdx]=useState(0);
  const[pdfName,setPdfName]=useState(null);
  const[pdfB64,setPdfB64]=useState(null);
  const[isParsing,setIsParsing]=useState(false);
  const[results,setResults]=useState(null);
  const[error,setError]=useState(null);
  const[form,setForm]=useState({companyName:'',website:'',sector:'',country:'Türkiye',foundedYear:'',stage:'Seed',round:'',description:'',problem:'',arr:'',mrr:'',burnRate:'',runway:'',arpu:'',cac:'',ltv:'',preMoneyVal:'',postMoneyVal:'',askAmount:'',founders:[{name:'',role:'CEO',linkedin:''},{name:'',role:'CTO',linkedin:''}],competitors:'',capTable:''});
  const fileRef=useRef(null);
  const loadTimer=useRef(null);

  useEffect(()=>{
    if(step==='analyzing'){let i=0;loadTimer.current=setInterval(()=>{i=(i+1)%7;setLoadIdx(i);},2500);}
    return()=>clearInterval(loadTimer.current);
  },[step]);

  const upd=k=>v=>setForm(p=>({...p,[k]:v}));
  const updF=(i,k)=>v=>setForm(p=>({...p,founders:p.founders.map((f,idx)=>idx===i?{...f,[k]:v}:f)}));

  const handleFile=ev=>{
    const f=ev.target.files[0];if(!f)return;
    setPdfName(f.name);
    const r=new FileReader();r.onload=()=>setPdfB64(r.result.split(',')[1]);r.readAsDataURL(f);
  };

  const handleParse=async()=>{
    if(!pdfB64)return;setIsParsing(true);setError(null);
    try{
      const p=await parsePDF(pdfB64);
      if(p){setForm(prev=>({...prev,...Object.fromEntries(Object.entries(p).filter(([k,v])=>k!=='founders'&&v)),founders:p.founders?.filter(f=>f.name).length?p.founders:prev.founders}));}
    }catch(err){setError('PDF okuma hatası: '+err.message);}
    setIsParsing(false);
  };

  const handleAnalyze=async()=>{
    if(!form.companyName.trim())return;
    setError(null);setStep('analyzing');setLoadIdx(0);
    try{
      const prompt=buildPrompt(form,depth);
      const msgs=[{role:'user',content:pdfB64?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfB64}},{type:'text',text:prompt}]:[{type:'text',text:prompt}]}];
      const raw=await callAPI(msgs,depth==='deep');
      const json=JSON.parse(raw.replace(/```json|```/g,'').trim());
      setResults(json);setStep('results');
    }catch(err){setError('Analiz hatası: '+err.message);setStep('form');}
  };

  const header=h('header',{style:{background:'white',borderBottom:'1px solid #E5E7EB',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',position:'sticky',top:0,zIndex:100}},
    h('div',{style:{display:'flex',alignItems:'center',gap:9}},
      h('svg',{width:28,height:28,viewBox:'0 0 28 28',fill:'none'},h('rect',{width:28,height:28,rx:7,fill:'#111827'}),h('path',{d:'M8 20L14 8L20 20',stroke:'#F9FAFB',strokeWidth:2.2,strokeLinecap:'round',strokeLinejoin:'round'}),h('path',{d:'M10 16H18',stroke:'#2563EB',strokeWidth:2.2,strokeLinecap:'round'})),
      h('div',null,h('div',{style:{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:16}},'Angel Lens'),h('div',{style:{fontSize:10,color:'#9CA3AF'}},'Melek Yatırımcı Platformu'))
    ),
    step==='results'&&h('button',{onClick:()=>{setStep('form');setResults(null);setError(null);},style:{fontSize:13,color:'#6B7280',background:'none',border:'1px solid #E5E7EB',borderRadius:8,padding:'6px 14px',cursor:'pointer'}},'← Yeni Analiz')
  );

  if(step==='form')return h('div',null,header,
    h('div',{style:{maxWidth:820,margin:'0 auto',padding:'28px 20px'},className:'fi'},
      h('div',{style:{marginBottom:20}},h('div',{style:{fontSize:20,fontWeight:800,fontFamily:"'Sora',sans-serif",marginBottom:4}},'Startup Değerlendirmesi'),h('div',{style:{fontSize:13,color:'#6B7280'}},'Pitch deck yükleyin veya bilgileri girin. Exit analizi dahil tam rapor üretilir.')),
      error&&h('div',{className:'err'},error),
      h('div',{className:'card'},
        h('div',{className:'st'},'Pitch Deck (Opsiyonel)'),
        h('div',{onClick:()=>fileRef.current?.click(),style:{border:`2px dashed ${pdfName?'#059669':'#D1D5DB'}`,borderRadius:10,padding:16,textAlign:'center',cursor:'pointer',background:pdfName?'#F0FDF4':'#F9FAFB'}},
          h('input',{ref:fileRef,type:'file',accept:'.pdf',onChange:handleFile,style:{display:'none'}}),
          pdfName?h('div',null,h('div',{style:{fontSize:13,fontWeight:700,color:'#059669',marginBottom:2}},pdfName),h('div',{style:{fontSize:11,color:'#6B7280'}},'Yüklendi')):h('div',{style:{fontSize:13,color:'#6B7280'}},'PDF tıkla veya sürükle')
        ),
        pdfB64&&h('button',{onClick:handleParse,disabled:isParsing,style:{marginTop:10,width:'100%',padding:'9px 0',background:'#EFF6FF',color:'#2563EB',border:'1px solid #BFDBFE',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600,opacity:isParsing?.6:1}},isParsing?'Okunuyor…':'✨ PDF\'den Otomatik Doldur')
      ),
      h('div',{className:'card'},
        h('div',{className:'st'},'Şirket Bilgileri'),
        h('div',{className:'g2',style:{marginBottom:10}},
          ...[['companyName','Şirket Adı *','Sensible Stats'],['website','Website','https://…'],['sector','Sektör','Sports Analytics'],['country','Ülke','Türkiye'],['foundedYear','Kuruluş Yılı','2024']].map(([k,lbl,ph])=>h('div',{key:k},h('div',{className:'lbl'},lbl),h('input',{className:'inp',value:form[k]||'',onChange:ev=>upd(k)(ev.target.value),placeholder:ph})))
        ),
        h('div',{style:{marginBottom:10}},h('div',{className:'lbl'},'Aşama'),h('select',{className:'sel',value:form.stage,onChange:ev=>upd('stage')(ev.target.value)},['Pre-Seed','Seed','Series A','Series B','Series C+'].map(o=>h('option',{key:o,value:o},o)))),
        h('div',{style:{marginBottom:10}},h('div',{className:'lbl'},'Açıklama'),h('textarea',{className:'ta',rows:2,value:form.description||'',onChange:ev=>upd('description')(ev.target.value),placeholder:'Şirket ne yapıyor?'})),
        h('div',null,h('div',{className:'lbl'},'Problem'),h('textarea',{className:'ta',rows:2,value:form.problem||'',onChange:ev=>upd('problem')(ev.target.value),placeholder:'Hangi problemi çözüyor?'}))
      ),
      h('div',{className:'card'},
        h('div',{className:'st'},'Kurucu Ekip'),
        form.founders.map((f,i)=>h('div',{key:i,style:{background:'#F9FAFB',borderRadius:10,padding:12,marginBottom:10,position:'relative'}},
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 80px 1.3fr',gap:10}},
            h('div',null,h('div',{className:'lbl'},'İsim'),h('input',{className:'inp',value:f.name||'',onChange:ev=>updF(i,'name')(ev.target.value),placeholder:'Ad Soyad'})),
            h('div',null,h('div',{className:'lbl'},'Rol'),h('input',{className:'inp',value:f.role||'',onChange:ev=>updF(i,'role')(ev.target.value),placeholder:'CEO'})),
            h('div',null,h('div',{className:'lbl'},'LinkedIn'),h('input',{className:'inp',value:f.linkedin||'',onChange:ev=>updF(i,'linkedin')(ev.target.value),placeholder:'linkedin.com/in/…'}))
          ),
          form.founders.length>1&&h('button',{onClick:()=>setForm(p=>({...p,founders:p.founders.filter((_,idx)=>idx!==i)})),style:{position:'absolute',top:8,right:10,background:'none',border:'none',cursor:'pointer',color:'#9CA3AF',fontSize:15}},'\u00d7')
        )),
        form.founders.length<5&&h('button',{onClick:()=>setForm(p=>({...p,founders:[...p.founders,{name:'',role:'',linkedin:''}]})),style:{fontSize:13,color:'#2563EB',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:'6px 14px',cursor:'pointer',fontWeight:600}},'+ Kurucu Ekle')
      ),
      h('div',{className:'card'},
        h('div',{className:'st'},'Finansal Metrikler'),
        h('div',{className:'g3'},
          ...[['arr','ARR ($)','120,000'],['mrr','MRR ($)','10,000'],['burnRate','Burn/ay ($)','25,000'],['runway','Runway (ay)','18'],['arpu','ARPU ($)','10'],['cac','CAC ($)','50'],['ltv','LTV ($)','200'],['preMoneyVal','Pre-Money ($)','5,000,000'],['askAmount','Aranan Yatırım ($)','500,000']].map(([k,lbl,ph])=>h('div',{key:k},h('div',{className:'lbl'},lbl),h('input',{className:'inp',value:form[k]||'',onChange:ev=>upd(k)(ev.target.value),placeholder:ph})))
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'st'},'Ek Bilgiler'),
        h('div',{style:{marginBottom:10}},h('div',{className:'lbl'},'Rakipler'),h('textarea',{className:'ta',rows:2,value:form.competitors||'',onChange:ev=>upd('competitors')(ev.target.value),placeholder:'FBref, WhoScored…'})),
        h('div',null,h('div',{className:'lbl'},'Cap Table'),h('textarea',{className:'ta',rows:2,value:form.capTable||'',onChange:ev=>upd('capTable')(ev.target.value),placeholder:'Kurucular %80…'}))
      ),
      h('div',{className:'card'},
        h('div',{className:'st'},'Analiz Ayarları'),
        h('div',{className:'lbl',style:{marginBottom:8}},'Derinlik'),
        h('div',{style:{display:'flex',gap:8}},
          [['fast','⚡ Hızlı'],['deep','🔬 Derin']].map(([v,lbl])=>h('button',{key:v,onClick:()=>setDepth(v),className:`tog${depth===v?' on':''}`},lbl))
        )
      ),
      h('button',{className:'btn-p',onClick:handleAnalyze,disabled:!form.companyName.trim()},'🚀 Analizi Başlat')
    )
  );

  if(step==='analyzing')return h('div',null,header,
    h('div',{style:{maxWidth:460,margin:'80px auto',padding:'0 20px',textAlign:'center'}},
      h('div',{style:{fontSize:18,fontWeight:700,fontFamily:"'Sora',sans-serif",marginBottom:10}},'Analiz Yapılıyor…'),
      h('div',{style:{color:'#6B7280',fontSize:13,marginBottom:22,lineHeight:1.6,minHeight:40}},MSGS[loadIdx]),
      h('div',{style:{background:'#E5E7EB',borderRadius:3,height:4,overflow:'hidden'}},h('div',{style:{height:'100%',width:`${(loadIdx+1)/7*100}%`,background:'#111827',borderRadius:3,transition:'width .5s ease'}})),
      h('div',{style:{marginTop:8,fontSize:12,color:'#9CA3AF'}},`${loadIdx+1} / 7`)
    )
  );

  if(step==='results'&&results)return h('div',null,header,h(Results,{results,form}));
  return h('div',null,header);
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
