*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--gray-900);font-size:14px;line-height:1.6}
input,textarea,select,button{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--gray-100)}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
.inp{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;color:var(--gray-900);background:white;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.ta{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;color:var(--gray-900);background:white;outline:none;resize:vertical;line-height:1.6}
.ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.sel{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;color:var(--gray-900);background:white;outline:none}
.card{background:white;border-radius:8px;padding:22px;border:1px solid var(--gray-200);margin-bottom:14px}
.sec{font-size:11px;font-weight:600;color:var(--gray-400);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gray-100)}
.lbl{font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:.5px;margin-bottom:4px;text-transform:uppercase}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.btn-p{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-p:hover{background:#1e40af}.btn-p:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed}
.tog{padding:7px 14px;border-radius:6px;font-weight:500;font-size:13px;cursor:pointer;border:1px solid var(--gray-200);background:white;color:var(--gray-500);transition:all .15s}
.tog.on{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:600}
.bt{height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden;margin-top:5px}
.bf{height:100%;border-radius:2px;transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.err{background:var(--red-light);border:1px solid #FECACA;border-radius:6px;padding:11px 14px;margin-bottom:14px;color:var(--red);font-size:13px}
.toast{position:fixed;top:66px;right:20px;background:var(--navy);color:white;padding:10px 18px;border-radius:6px;font-weight:500;font-size:13px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:ts .25s ease}
@keyframes ts{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease}
.header{background:var(--navy);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.logo-text{color:white;font-weight:700;font-size:16px;letter-spacing:-.2px}
.logo-sub{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.nav-btn{font-size:13px;color:rgba(255,255,255,.55);background:none;border:none;padding:6px 14px;cursor:pointer;border-radius:5px;font-weight:500;transition:all .15s}
.nav-btn:hover{color:white;background:rgba(255,255,255,.08)}
.lang-btn{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);background:none;border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:5px 11px;cursor:pointer;transition:all .15s}
.lang-btn:hover{color:white;border-color:rgba(255,255,255,.35)}
.kpi{background:white;border:1px solid var(--gray-200);border-radius:8px;padding:16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--gray-400);letter-spacing:.7px;text-transform:uppercase;margin-bottom:7px}
.kpi-val{font-size:17px;font-weight:700;color:var(--gray-900);line-height:1.3}
.score-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.q-card{border-left:3px solid var(--blue);padding:14px 16px;background:var(--gray-50);border-radius:0 6px 6px 0;margin-bottom:10px}
.comp-row{display:grid;grid-template-columns:140px 100px 80px 1fr 1fr 70px;gap:8px;padding:9px 12px;border-bottom:1px solid var(--gray-100);align-items:start;font-size:12px}
.comp-header{background:var(--gray-50);font-weight:600;color:var(--gray-500);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.threat-high{color:var(--red);font-weight:700}.threat-medium{color:var(--amber);font-weight:600}.threat-low{color:var(--green);font-weight:600}
.tab-wrap{border:1px solid var(--gray-200);border-radius:8px;overflow:hidden}
.tab-row{display:grid;gap:0;border-bottom:1px solid var(--gray-100)}
.scenario-card{border-radius:8px;padding:18px;border:1px solid}
.ver-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(29,78,216,.15);border:1px solid rgba(29,78,216,.3);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#93C5FD;letter-spacing:.5px;margin-left:8px}
@media print{.header,[data-np]{display:none!important}body{background:white}.card{border:1px solid #ddd;box-shadow:none}}
</style>

1. A senior Venture Capital / Growth Equity General Partner
2. An institutional investment professional writing IC-quality memos

Description: ${form.description||'?'}
Problem Solved: ${form.problem||'?'}

${founders}
Financials: ARR=${form.arr||'?'} | MRR=${form.mrr||'?'} | Monthly Burn=${form.burnRate||'?'} | Runway=${form.runway||'?'} months | ARPU=${form.arpu||'?'} | CAC=${form.cac||'?'} | LTV=${form.ltv||'?'}
Valuation: Pre-Money=${form.preMoneyVal||'?'} | Funding Ask=${form.askAmount||'?'}
Competitors: ${form.competitors||'?'}
Cap Table: ${form.capTable||'?'}

- Go beyond founder narrative. Distinguish signal from noise.
- Separate real product value from marketing language.
- Assess whether this can produce venture-scale returns.
- Maintain balanced but mildly skeptical stance.
- Be alert to: demos that look larger than reality; AI-washed SaaS; consulting disguised as product; weak distribution; vague positioning; commodity features.
- Do NOT penalize for missing information. Distinguish lack of evidence from evidence of weakness.

## SCORING METHODOLOGY
For every scored category show:
- Score (0.0–10.0), Confidence (low/medium/high), Information Completeness (low/medium/high)
- Score Revision Trigger: what new information could change the score

5. VALUATION: Reasonable vs peers, implied returns, comparable transactions?
6. GOVERNANCE/CONTROL: Board structure, minority rights, SHA, cap table?
7. VALUE CREATION: Non-capital contributions, synergies, portfolio fit?
8. EXIT: Realistic pathways, strategic buyers, M&A precedents, timeline?
9. FOUNDER-MARKET FIT (Angel): Domain expertise, personal motivation, unfair advantages?
10. PERSONAL NETWORK VALUE (Angel): How investor's own network adds value here?

OUTPUT LANGUAGE: ${isEN?'English':'Turkish'}

RETURN ONLY VALID JSON. NO OTHER TEXT. Scores are 0.0–10.0 with one decimal.

async function callAPI(msgs){
  const body={model:'claude-sonnet-4-20250514',max_tokens:8000,messages:msgs};
  const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,200));}
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  if(d.stop_reason==='tool_use'){const tr=d.content.filter(b=>b.type==='tool_use').map(b=>({type:'tool_result',tool_use_id:b.id,content:'ok'}));return callAPI([...msgs,{role:'assistant',content:d.content},{role:'user',content:tr}]);}
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function extractTextFromPDF(b64){
  return new Promise(resolve=>{
    if(window.pdfjsLib){doParse();return;}
    const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';doParse();};
    s.onerror=()=>resolve('');document.head.appendChild(s);
    async function doParse(){try{const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const pdf=await window.pdfjsLib.getDocument({data:bytes}).promise;let text='';for(let i=1;i<=Math.min(pdf.numPages,20);i++){const page=await pdf.getPage(i);const content=await page.getTextContent();text+=content.items.map(s=>s.str).join(' ')+'\n';}resolve(text.slice(0,12000));}catch{resolve('');}}
  });
}
async function parsePDF(b64){
  const pdfText=await extractTextFromPDF(b64);if(!pdfText)throw new Error('PDF text could not be extracted');
  const t=await callAPI([{role:'user',content:[{type:'text',text:`Extract startup info from this pitch deck text:\n${pdfText}\n\nReturn ONLY valid JSON (no fences): {"companyName":"","website":"","sector":"","country":"","foundedYear":"","stage":"Seed","round":"","description":"","problem":"","arr":"","mrr":"","burnRate":"","runway":"","arpu":"","cac":"","ltv":"","preMoneyVal":"","postMoneyVal":"","askAmount":"","founders":[{"name":"","role":"","linkedin":""}],"competitors":"","capTable":""}`}]}]);
  return JSON.parse(t.replace(/```json|```/g,'').trim());
}

function App(){
  const[lang,setLang]=useState('tr');
  const[step,setStep]=useState('form');
  const[loadIdx,setLoadIdx]=useState(0);
  const[pdfName,setPdfName]=useState(null);
  const[pdfB64,setPdfB64]=useState(null);
  const[isParsing,setIsParsing]=useState(false);
  const[pptxBusy,setPptxBusy]=useState(false);
  const[toast,setToast]=useState(null);
  const[results,setResults]=useState(null);
  const[error,setError]=useState(null);
  const[form,setForm]=useState({companyName:'',website:'',sector:'',country:'Türkiye',foundedYear:'',stage:'Seed',round:'',description:'',problem:'',arr:'',mrr:'',burnRate:'',runway:'',arpu:'',cac:'',ltv:'',preMoneyVal:'',postMoneyVal:'',askAmount:'',founders:[{name:'',role:'CEO',linkedin:''},{name:'',role:'CTO',linkedin:''}],competitors:'',capTable:''});
  const fileRef=useRef(null);const loadTimer=useRef(null);

  useEffect(()=>{if(step==='analyzing'){let i=0;loadTimer.current=setInterval(()=>{i=(i+1)%7;setLoadIdx(i);},2800);}return()=>clearInterval(loadTimer.current);},[step]);

  const L=(a,b)=>lang==='tr'?a:b;
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2800);};
  const upd=k=>v=>setForm(p=>({...p,[k]:v}));
  const updF=(i,k)=>v=>setForm(p=>({...p,founders:p.founders.map((f,idx)=>idx===i?{...f,[k]:v}:f)}));
  const updNum=k=>e=>{const v=e.target.value.replace(/,/g,'');if(!v||!isNaN(v))setForm(p=>({...p,[k]:v?Number(v).toLocaleString('en-US'):''}));};
  const handleFile=ev=>{const f=ev.target.files[0];if(!f)return;setPdfName(f.name);const r=new FileReader();r.onload=()=>setPdfB64(r.result.split(',')[1]);r.readAsDataURL(f);};

  const handleParse=async()=>{
    if(!pdfB64)return;
    setIsParsing(true);setError(null);
    try{
      const p=await parsePDF(pdfB64);
      if(p){setForm(prev=>({...prev,...Object.fromEntries(Object.entries(p).filter(([k,v])=>k!=='founders'&&v)),founders:p.founders?.filter(f=>f.name).length?p.founders:prev.founders}));showToast(L('PDF okundu, form dolduruldu','PDF parsed and form filled'));}
    }catch(err){setError(err.message);}
    setIsParsing(false);
  };

  const handleAnalyze=async()=>{
    if(!form.companyName.trim())return;
    setError(null);setStep('analyzing');setLoadIdx(0);
    try{
      const prompt=buildPrompt(form,lang);
      const raw=await callAPI([{role:'user',content:[{type:'text',text:prompt}]}]);
      const json=JSON.parse(raw.replace(/```json|```/g,'').trim());
      setResults(json);setStep('results');
    }catch(err){setError(err.message);setStep('form');}
  };

  const handlePptx=async()=>{
    if(!results)return;
    setPptxBusy(true);setError(null);
    try{await generatePPTX(results,form,lang);showToast(L('PPTX indirildi!','PPTX downloaded!'));}
    catch(err){console.error(err);setError('PPTX: '+err.message);}
    setPptxBusy(false);
  };
