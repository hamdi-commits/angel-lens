<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Angel Lens — Melek Yatırımcı Platformu</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F9FAFB;color:#111827;min-height:100vh}
input,textarea,select,button{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#F1F5F9}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.inp{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#111827;background:white;outline:none;transition:border-color .15s}
.inp:focus{border-color:#2563EB}
.ta{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#111827;background:white;outline:none;resize:vertical}
.ta:focus{border-color:#2563EB}
.sel{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;color:#111827;background:white;outline:none}
.card{background:white;border-radius:16px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);margin-bottom:18px}
.st{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#111827;margin-bottom:16px}
.lbl{font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.6px;margin-bottom:5px;text-transform:uppercase}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.btn-p{width:100%;padding:15px;background:#111827;color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif}
.btn-p:hover{opacity:.9}.btn-p:disabled{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed}
.tog{padding:8px 15px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:2px solid #E5E7EB;background:white;color:#6B7280;transition:all .15s}
.tog.on{border-color:#2563EB;background:#EFF6FF;color:#2563EB}
.bt{height:5px;background:#F3F4F6;border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .35s ease forwards}
@keyframes ts{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.toast{animation:ts .3s ease forwards;position:fixed;top:72px;right:20px;background:#059669;color:white;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.15)}
@media print{header,[data-np]{display:none!important}body{background:white}}

/* API KEY MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:white;border-radius:20px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React;

// ── STORAGE (localStorage fallback for standalone) ─────────────
const STORE_PFX='al3:';
const storage={
  async set(k,v){try{localStorage.setItem(k,v);}catch{}},
  async get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  async delete(k){try{localStorage.removeItem(k);}catch{}},
  async list(pfx){try{const keys=Object.keys(localStorage).filter(k=>k.startsWith(pfx));return{keys};}catch{return{keys:[]};}}
};

async function saveAnalysis(form,results){
  const id=Date.now().toString();
  await storage.set(STORE_PFX+id,JSON.stringify({id,form,results,savedAt:new Date().toISOString()}));
  return id;
}
async function loadAllAnalyses(){
  const{keys}=await storage.list(STORE_PFX);
  const out=[];
  for(const key of keys){
    try{const r=await storage.get(key);if(r)out.push({key,...JSON.parse(r.value)});}catch{}
  }
  return out.sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
}
async function deleteAnalysis(key){await storage.delete(key);}

// ── CRITERIA ──────────────────────────────────────────────────
const VC_CRITERIA=[
  {id:"market",tr:"Pazar Değerlendirmesi",en:"Market Assessment",w:15},
  {id:"competitive",tr:"Rekabet Avantajı",en:"Competitive Advantage",w:20},
  {id:"financial",tr:"Finansal Profil",en:"Financial Profile",w:15},
  {id:"management",tr:"Yönetim",en:"Management",w:20},
  {id:"valuation",tr:"Şirket Değeri",en:"Valuation",w:10},
  {id:"governance",tr:"Denetim & Kontrol",en:"Governance",w:5},
  {id:"value_creation",tr:"Değer Yaratma",en:"Value Creation",w:5},
  {id:"exit",tr:"Çıkış Fırsatları",en:"Exit Opportunities",w:10},
];
const ANGEL_CRITERIA=[
  {id:"founder_fit",tr:"Founder-Market Fit",en:"Founder-Market Fit",w:0},
  {id:"network",tr:"Kişisel Ağ Değeri",en:"Personal Network Value",w:0},
];
const ALL_CRITERIA=[...VC_CRITERIA,...ANGEL_CRITERIA];

const LOADING={
  tr:["Pitch deck analiz ediliyor…","Kurucu profilleri araştırılıyor…","Pazar ve rekabet verileri taranıyor…","VC 8 Kriteri uygulanıyor…","Angel kriterleri değerlendiriliyor…","Exit ve getiri analizi hesaplanıyor…","Yatırım raporu derleniyor…"],
  en:["Reading pitch deck…","Researching founder profiles…","Scanning market & competition…","Applying VC 8 Criteria…","Evaluating angel criteria…","Calculating exit & return analysis…","Compiling investment report…"],
};

const VC8=`GİRİŞİM SERMAYESİ FONLARININ 8 KRİTERİ:
1. PAZAR DEĞERLENDİRMESİ: Büyümeye açık, talep yüksek, rekabet uygun, şeffaf pazar mı?
2. REKABET AVANTAJI: Pazar liderleri, üstün/zayıf noktalar, sürdürülebilir avantaj?
3. FİNANSAL PROFİL: Finansal yapı büyümeyi taşıyacak güçte mi?
4. YÖNETİM: Ekip yetkinliği, kritik açıklar, kurucu motivasyonu?
5. ŞİRKET DEĞERİ: Değerleme piyasa koşullarına makul mü?
6. DENETİM & KONTROL: Yönetim denetimi, azınlık hakları?
7. DEĞER YARATMA: Katma değer, sermaye dışı katkı, portföy sinerjisi?
8. ÇIKIŞ FIRSATLARI: Uygun çıkış yolu, potansiyel alıcılar?
ANGEL EK KRİTERLER:
9. FOUNDER-MARKET FIT: Kurucular bu problemi çözmek için ideal konumda mı?
10. KİŞİSEL AĞ DEĞERİ: Yatırımcı kendi ağıyla ne katkı sağlayabilir?`;

// ── UTILS ─────────────────────────────────────────────────────
const sc=s=>s>=7.5?'#059669':s>=6.0?'#D97706':s>=4.5?'#EA580C':'#DC2626';
const scH=s=>s>=7.5?'059669':s>=6.0?'D97706':s>=4.5?'EA580C':'DC2626';
const REC={
  pass:{tr:'GEÇ',en:'PASS',bg:'#FEF2F2',c:'#DC2626',b:'#FECACA'},
  watch:{tr:'İZLE',en:'WATCH',bg:'#FFFBEB',c:'#D97706',b:'#FDE68A'},
  meeting:{tr:'TOPLANTI AL',en:'TAKE MEETING',bg:'#EFF6FF',c:'#2563EB',b:'#BFDBFE'},
  diligence:{tr:'DERİN İNCELEME',en:'DEEP DILIGENCE',bg:'#F0FDF4',c:'#059669',b:'#A7F3D0'},
};
const rcfg=r=>REC[r]||REC.meeting;
const rcH_=r=>({pass:'DC2626',watch:'D97706',meeting:'2563EB',diligence:'059669'})[r]||'2563EB';
const rcL_=r=>({pass:'GEÇ',watch:'İZLE',meeting:'TOPLANTI AL',diligence:'DERİN İNCELEME'})[r]||'TOPLANTI AL';

// ── PPTX ──────────────────────────────────────────────────────
async function loadPptx(){if(window.PptxGenJS)return;await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

async function generatePptx(results,form){
  await loadPptx();
  const pptx=new window.PptxGenJS();pptx.layout='LAYOUT_16x9';pptx.title=`${form.companyName||'Startup'} - Angel Lens`;
  const W='FFFFFF',N='111827',B='2563EB',G='9CA3AF',LT='F9FAFB';
  const ws=results.weighted_score||0,wsc=scH(ws),rrc=rcH_(results.recommendation),rrl=rcL_(results.recommendation);
  const ex=results.exit_analysis||{};

  let sl=pptx.addSlide();sl.background={color:N};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:.32,h:5.625,fill:{color:B}});
  sl.addText('ANGEL LENS',{x:.55,y:.45,w:5,h:.28,fontSize:9,color:G,bold:true,charSpacing:4});
  sl.addText(form.companyName||'Şirket',{x:.55,y:.85,w:7.5,h:1.1,fontSize:44,color:W,bold:true,fontFace:'Calibri'});
  sl.addText(`${form.stage||''} · ${form.sector||''} · ${new Date().toLocaleDateString('tr-TR',{month:'long',year:'numeric'})}`,{x:.55,y:1.95,w:7,h:.34,fontSize:12,color:'6B7280'});
  sl.addShape(pptx.shapes.RECTANGLE,{x:.55,y:2.42,w:1.65,h:1.65,fill:{color:'1F2937'}});
  sl.addText(ws.toFixed(1),{x:.55,y:2.5,w:1.65,h:.95,fontSize:40,color:wsc,bold:true,align:'center'});
  sl.addText('/10',{x:.55,y:3.38,w:1.65,h:.32,fontSize:11,color:G,align:'center'});
  sl.addShape(pptx.shapes.RECTANGLE,{x:2.5,y:2.68,w:2.7,h:.62,fill:{color:rrc}});
  sl.addText(rrl,{x:2.5,y:2.68,w:2.7,h:.62,fontSize:12,color:W,bold:true,align:'center',valign:'middle'});
  sl.addText(results.executive_summary||'',{x:.55,y:3.98,w:9,h:1.3,fontSize:12,color:'D1D5DB',wrap:true,lineSpacingMultiple:1.4});

  sl=pptx.addSlide();sl.background={color:LT};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.55,fill:{color:N}});
  sl.addText('VC 8 KRİTERİ',{x:.4,y:0,w:9,h:.55,fontSize:13,color:W,bold:true,valign:'middle'});
  VC_CRITERIA.forEach((c,i)=>{const s=results.scores?.[c.id]?.score||0,col=scH(s),y=.7+i*.56;sl.addText(c.tr,{x:.3,y,w:2.8,h:.34,fontSize:11,color:'374151',valign:'middle'});sl.addShape(pptx.shapes.RECTANGLE,{x:3.75,y:y+.08,w:5.6,h:.19,fill:{color:'E5E7EB'}});const bw=(s/10)*5.6;if(bw>.01)sl.addShape(pptx.shapes.RECTANGLE,{x:3.75,y:y+.08,w:bw,h:.19,fill:{color:col}});sl.addText(s.toFixed(1),{x:9.45,y,w:.5,h:.34,fontSize:12,color:col,bold:true,align:'right',valign:'middle'});});

  sl=pptx.addSlide();sl.background={color:LT};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.55,fill:{color:N}});
  sl.addText('EXIT ANALİZİ & GETİRİ HESABI',{x:.4,y:0,w:9,h:.55,fontSize:13,color:W,bold:true,valign:'middle'});
  const kpis=[['Giriş Değeri',ex.entry_valuation||'—'],['Hedef Exit',ex.expected_exit_value||'—'],['Exit Süresi',ex.time_to_exit||'—'],['Baz Getiri',ex.return_scenarios?.base?.multiple?`${ex.return_scenarios.base.multiple}x`:'—']];
  kpis.forEach(([lbl,val],i)=>{const x=.28+i*2.42;sl.addShape(pptx.shapes.RECTANGLE,{x,y:.7,w:2.2,h:1.18,fill:{color:'F8FAFC'}});sl.addText(lbl,{x,y:.78,w:2.2,h:.3,fontSize:9,color:'6B7280',align:'center',bold:true});sl.addText(val,{x,y:1.08,w:2.2,h:.65,fontSize:18,color:'111827',bold:true,align:'center',valign:'middle'});});
  const scen=[['BEAR',ex.return_scenarios?.bear,'DC2626'],['BAZ',ex.return_scenarios?.base,'D97706'],['BULL',ex.return_scenarios?.bull,'059669']];
  scen.forEach(([lbl,s,col],i)=>{if(!s)return;const x=.28+i*3.18;sl.addShape(pptx.shapes.RECTANGLE,{x,y:2.44,w:2.92,h:1.5,fill:{color:'F9FAFB'}});sl.addShape(pptx.shapes.RECTANGLE,{x,y:2.44,w:2.92,h:.3,fill:{color:col}});sl.addText(lbl,{x,y:2.44,w:2.92,h:.3,fontSize:10,color:W,bold:true,align:'center',valign:'middle'});sl.addText(`${s.multiple||'?'}x`,{x,y:2.77,w:2.92,h:.55,fontSize:26,color:col,bold:true,align:'center'});sl.addText(s.irr||'',{x,y:3.3,w:2.92,h:.26,fontSize:10,color:'6B7280',align:'center'});sl.addText(s.exit_value||'',{x,y:3.55,w:2.92,h:.26,fontSize:10,color:'374151',align:'center'});});
  (ex.exit_candidates||[]).slice(0,5).forEach((c,i)=>{const x=.28+i*1.9;sl.addShape(pptx.shapes.RECTANGLE,{x,y:4.44,w:1.75,h:.86,fill:{color:'EFF6FF'}});sl.addText(c.name||'',{x,y:4.47,w:1.75,h:.36,fontSize:10,color:'1E40AF',bold:true,align:'center',valign:'middle'});sl.addText(c.type||'',{x,y:4.82,w:1.75,h:.28,fontSize:8,color:'6B7280',align:'center'});});

  sl=pptx.addSlide();sl.background={color:LT};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.55,fill:{color:N}});
  sl.addText('BULL CASE & BEAR CASE',{x:.4,y:0,w:9,h:.55,fontSize:13,color:W,bold:true,valign:'middle'});
  sl.addShape(pptx.shapes.RECTANGLE,{x:.25,y:.68,w:4.65,h:4.7,fill:{color:'F0FDF4'}});sl.addShape(pptx.shapes.RECTANGLE,{x:.25,y:.68,w:4.65,h:.42,fill:{color:'059669'}});sl.addText('BULL CASE',{x:.35,y:.68,w:4.45,h:.42,fontSize:12,color:W,bold:true,valign:'middle',charSpacing:1});
  (results.bull_case||[]).slice(0,5).forEach((item,i)=>{sl.addShape(pptx.shapes.RECTANGLE,{x:.4,y:1.2+i*.68,w:.06,h:.42,fill:{color:'059669'}});sl.addText(item,{x:.58,y:1.18+i*.68,w:4.1,h:.46,fontSize:11,color:'065F46',wrap:true,valign:'top'});});
  sl.addShape(pptx.shapes.RECTANGLE,{x:5.1,y:.68,w:4.65,h:4.7,fill:{color:'FFF7ED'}});sl.addShape(pptx.shapes.RECTANGLE,{x:5.1,y:.68,w:4.65,h:.42,fill:{color:'EA580C'}});sl.addText('BEAR CASE',{x:5.2,y:.68,w:4.45,h:.42,fontSize:12,color:W,bold:true,valign:'middle',charSpacing:1});
  (results.bear_case||[]).slice(0,5).forEach((item,i)=>{sl.addShape(pptx.shapes.RECTANGLE,{x:5.25,y:1.2+i*.68,w:.06,h:.42,fill:{color:'EA580C'}});sl.addText(item,{x:5.43,y:1.18+i*.68,w:4.1,h:.46,fontSize:11,color:'7C2D12',wrap:true,valign:'top'});});

  sl=pptx.addSlide();sl.background={color:LT};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.55,fill:{color:N}});
  sl.addText('TOPLANTIDA SORULACAK SORULAR',{x:.4,y:0,w:9,h:.55,fontSize:13,color:W,bold:true,valign:'middle'});
  (results.questions||[]).slice(0,4).forEach((q,i)=>{const y=.68+i*1.22;sl.addShape(pptx.shapes.RECTANGLE,{x:.25,y,w:9.5,h:1.12,fill:{color:'F9FAFB'}});sl.addShape(pptx.shapes.RECTANGLE,{x:.25,y,w:.06,h:1.12,fill:{color:B}});sl.addText((q.category||'').toUpperCase(),{x:.44,y:y+.04,w:2,h:.22,fontSize:8,color:'2563EB',bold:true,charSpacing:1});sl.addText(q.question||'',{x:.44,y:y+.24,w:9,h:.36,fontSize:11,color:'111827',bold:true,wrap:true});sl.addText(`✓ ${q.good_answer||''}`,{x:.44,y:y+.62,w:4.45,h:.44,fontSize:9,color:'059669',wrap:true});sl.addText(`⚠ ${q.red_flag||''}`,{x:5.05,y:y+.62,w:4.6,h:.44,fontSize:9,color:'DC2626',wrap:true});});

  sl=pptx.addSlide();sl.background={color:N};
  sl.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.55,fill:{color:B}});
  sl.addText('MEETING CHEAT SHEET',{x:.4,y:0,w:9,h:.55,fontSize:14,color:W,bold:true,valign:'middle',charSpacing:2});
  sl.addText(form.companyName||'',{x:.5,y:.7,w:5.5,h:.72,fontSize:28,color:W,bold:true});
  sl.addText(`Ağırlıklı: ${ws.toFixed(1)}/10  |  ${form.stage||''}`,{x:.5,y:1.4,w:5,h:.34,fontSize:12,color:G});
  sl.addShape(pptx.shapes.RECTANGLE,{x:6.5,y:.68,w:3.2,h:.88,fill:{color:rrc}});
  sl.addText(rrl,{x:6.5,y:.68,w:3.2,h:.88,fontSize:16,color:W,bold:true,align:'center',valign:'middle'});
  sl.addShape(pptx.shapes.RECTANGLE,{x:.3,y:1.9,w:9.4,h:1.0,fill:{color:'1F2937'}});
  sl.addShape(pptx.shapes.RECTANGLE,{x:.3,y:1.9,w:9.4,h:.27,fill:{color:B}});
  sl.addText('TEK SORU',{x:.42,y:1.9,w:9,h:.27,fontSize:8,color:W,bold:true,valign:'middle',charSpacing:3});
  sl.addText(`"${results.key_question||''}"`,{x:.42,y:2.2,w:9,h:.65,fontSize:11,color:'E0E7FF',italic:true,wrap:true});
  sl.addShape(pptx.shapes.RECTANGLE,{x:.3,y:3.08,w:4.58,h:2.26,fill:{color:'1F2937'}});
  sl.addText('BREAKOUT KOŞULLARI',{x:.44,y:3.13,w:4.2,h:.27,fontSize:9,color:'60A5FA',bold:true,charSpacing:1});
  (results.breakout_conditions||[]).slice(0,4).forEach((c,i)=>sl.addText(`${i+1}. ${c}`,{x:.44,y:3.46+i*.44,w:4.2,h:.42,fontSize:10,color:'D1D5DB',wrap:true}));
  sl.addShape(pptx.shapes.RECTANGLE,{x:5.12,y:3.08,w:4.58,h:2.26,fill:{color:'1F2937'}});
  sl.addText('TAKİP METRİKLERİ',{x:5.26,y:3.13,w:4.2,h:.27,fontSize:9,color:'60A5FA',bold:true,charSpacing:1});
  (results.metrics_to_watch||[]).slice(0,4).forEach((m,i)=>sl.addText(`${i+1}. ${m}`,{x:5.26,y:3.46+i*.44,w:4.2,h:.42,fontSize:10,color:'D1D5DB',wrap:true}));

  await pptx.writeFile({fileName:`${form.companyName||'Startup'}_AngelLens.pptx`});
}

// ── PROMPT ────────────────────────────────────────────────────
function buildPrompt(form,depth,lang){
  const founders=form.founders.filter(f=>f.name).map(f=>`  - ${f.name} (${f.role||'?'}) ${f.linkedin||''}`).join('\n')||'  -';
  return `Sen üst düzey bir VC General Partner ve deneyimli Angel Investor'sın.

## STARTUP
Şirket: ${form.companyName||'?'} | Web: ${form.website||'?'} | Sektör: ${form.sector||'?'} | Ülke: ${form.country||'?'} | Kuruluş: ${form.foundedYear||'?'} | Aşama: ${form.stage} | Tur: ${form.round||'?'}
Açıklama: ${form.description||'?'} | Problem: ${form.problem||'?'}
Kurucular:\n${founders}
Finansallar: ARR=${form.arr||'?'} MRR=${form.mrr||'?'} Burn=${form.burnRate||'?'}/ay Runway=${form.runway||'?'}ay ARPU=${form.arpu||'?'} CAC=${form.cac||'?'} LTV=${form.ltv||'?'}
Giriş Değerlemesi: Pre-Money=${form.preMoneyVal||'?'} Ask=${form.askAmount||'?'}
Rakipler: ${form.competitors||'?'}

## ÇERÇEVE
${VC8}

## GÖREV

// ── CLAUDE API ────────────────────────────────────────────────
async function callClaude(msgs,search=false){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),120000); // 2 dk timeout
  try{
    const body={model:'claude-sonnet-4-20250514',max_tokens:4000,messages:msgs};
    if(search)body.tools=[{type:'web_search_20250305',name:'web_search'}];
    const res=await fetch('/api/proxy',{
      method:'POST',signal:controller.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    clearTimeout(timer);
    if(!res.ok){const e=await res.text();throw new Error('API '+res.status+': '+e.slice(0,200));}
    const data=await res.json();
    if(data.stop_reason==='tool_use'){
      const tr=data.content.filter(b=>b.type==='tool_use').map(b=>({type:'tool_result',tool_use_id:b.id,content:'search executed'}));
      return callClaude([...msgs,{role:'assistant',content:data.content},{role:'user',content:tr}],search);
    }
    return data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError')throw new Error('Analiz zaman aşımına uğradı (2dk). Hızlı modu deneyin.');
    if(e.message==='Failed to fetch')throw new Error('Bağlantı hatası. Lütfen API anahtarınızı kontrol edin: Anahtarı Değiştir butonuna tıklayın ve yeniden girin.');
    throw e;
  }
}
async function parsePdf(b64){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),45000);
  try{
    const body={model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:'Bu pitch deck PDF'inden startup bilgilerini çıkar. SADECE geçerli JSON döndür, başka hiçbir şey yazma:\n{"companyName":"","website":"","sector":"","country":"","foundedYear":"","stage":"Seed","round":"","description":"","problem":"","arr":"","mrr":"","burnRate":"","runway":"","arpu":"","cac":"","ltv":"","preMoneyVal":"","postMoneyVal":"","askAmount":"","founders":[{"name":"","role":"","linkedin":""}],"competitors":"","capTable":""}\nBilgi yoksa boş string bırak.'}
    ]}]};
    const res=await fetch('/api/proxy',{method:'POST',signal:controller.signal,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    clearTimeout(timer);
    if(!res.ok){const e=await res.text();throw new Error('API '+res.status+': '+e.slice(0,300));}
    const data=await res.json();
    const t=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    return JSON.parse(t.replace(/```json|```/g,'').trim());
  }catch(e){

    if(e.name==='AbortError')throw new Error('Zaman aşımı (45sn). İnternet bağlantınızı kontrol edin.');

    throw e;
  }
